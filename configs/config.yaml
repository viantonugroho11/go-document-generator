port: "8080"

# Jika menggunakan DATABASE_URL, field lain diabaikan
databaseurl: ""
dbhost: "postgres"
dbport: "5432"
dbuser: "postgres"
dbpassword: "postgres"
dbname: "appdb"
dbsslmode: "disable"

# Kafka
kafkabrokers: "kafka:9092"
kafkaclientid: "go-boilerplate-clean"
kafkagroupid: "go-boilerplate-clean-group"
kafkatopic: "user-events"
kafkatopictemplates: "template-events"
kafkatopictemplateversions: "template-version-events"
kafkatopicdocuments: "document-events"
kafkatopicdocumentprocess: "document-process"
kafkagroupiddocumentworker: "document-generator-worker"

# Redis
redisaddr: "redis:6379"
redispassword: ""
redisdb: "0"

# Storage
# provider: local | minio | s3 | aws | oss | alibaba
#
# Contoh AWS S3:
#   storageprovider: "s3"
#   storageendpoint: "s3.ap-southeast-1.amazonaws.com"
#   storageregion:   "ap-southeast-1"
#   storageaccesskey: "<AWS_ACCESS_KEY_ID>"
#   storagesecretkey: "<AWS_SECRET_ACCESS_KEY>"
#   storagebucket:   "my-documents"
#   storageusessl:   true
#
# Contoh Alibaba OSS (aktifkan S3-compatible API di console terlebih dahulu):
#   storageprovider: "oss"
#   storageendpoint: "oss-ap-southeast-5.aliyuncs.com"
#   storageaccesskey: "<OSS_ACCESS_KEY_ID>"
#   storagesecretkey: "<OSS_ACCESS_KEY_SECRET>"
#   storagebucket:   "my-documents"
#   storageusessl:   true
#
# Contoh MinIO lokal:
#   storageprovider: "minio"
#   storageendpoint: "localhost:9000"
#   storageaccesskey: "minioadmin"
#   storagesecretkey: "minioadmin"
#   storagebucket:   "documents"
#   storageusessl:   false
storageprovider: "local"
storagebasedir: "./storage/documents"
storageendpoint: ""
storageregion: ""
storageaccesskey: ""
storagesecretkey: ""
storagebucket: "documents"
storageusessl: false

# Auth — kosong = dev mode (no auth)
authapikeys: ""

# DMS
dmsendpoint: ""
dmsapikey: ""

# Callback
callbackhmacsecret: ""
callbackmaxretries: 3


